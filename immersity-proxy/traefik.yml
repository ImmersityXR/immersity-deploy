# ===========================================================================
# Traefik 3.3 Static Configuration
# ===========================================================================

# API and Dashboard
api:
  dashboard: true
  insecure: true  # Access dashboard on :8080 (Mapping is handled in docker-compose)

# Entry Points
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
    # New in v3: You can define default HTTP settings here, 
    # but your current label-based setup is also perfectly fine.
    http:
      tls:
        certResolver: letsencrypt

# Docker Provider
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # Ensures Traefik uses the 'proxy' network to communicate with other containers
    network: proxy

# Let's Encrypt Certificate Resolver
certificatesResolvers:
  letsencrypt:
    acme:
      # Note: Storage path must match the volume mount in docker-compose.yml
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# Logging
log:
  level: INFO  # Use DEBUG for troubleshooting during the migration

accessLog:
  # In v3, stdout is the default, but keeping this is fine for clarity
  filePath: "/dev/stdout"
  format: common
